{% extends "base.html" %}

{% block title %}Login - Local Marts{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card" style="box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); border: none; border-radius: 8px;">
                <div class="card-header" style="background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: #FFD700; border: none; padding: 25px; text-align: center;">
                    <h3 class="card-title mb-0"><i class="fas fa-sign-in-alt"></i> Login to Local Marts</h3>
                </div>
                <div class="card-body" style="padding: 30px;">
                    <form method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label"><strong>Username</strong></label>
                            <input type="text" class="form-control" id="username" name="username" required style="border-radius: 6px; padding: 12px;">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label"><strong>Password</strong></label>
                            <input type="password" class="form-control" id="password" name="password" required style="border-radius: 6px; padding: 12px;">
                        </div>

                        <div class="mb-3 text-end">
                            <a href="{{ url_for('forgot_password') }}" style="color: #FFD700; text-decoration: none; font-weight: 600;">
                                <i class="fas fa-key"></i> Forgot Password?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 mb-3" style="font-weight: 700; font-size: 1.05rem; padding: 12px;">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>

                    <hr style="margin: 20px 0;">
                    <p class="text-center">
                        Don't have an account? 
                        <a href="{{ url_for('register') }}" style="color: #FFD700; text-decoration: none; font-weight: 600;">
                            Register here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
