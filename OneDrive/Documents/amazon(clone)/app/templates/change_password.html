{% extends "base.html" %}

{% block title %}Change Password - Local Marts{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card" style="box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); border: none;">
                <div class="card-header" style="background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: #FFD700; border: none; padding: 30px; text-align: center;">
                    <h3 class="mb-2"><i class="fas fa-shield-alt"></i> Change Password</h3>
                    <p class="mb-0" style="color: #b0b0b0;">Secure your account with a new password</p>
                </div>
                <div class="card-body" style="padding: 40px;">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label"><strong>Current Password</strong></label>
                            <input type="password" class="form-control" name="old_password" required placeholder="Enter current password" style="padding: 12px; border-radius: 6px;">
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><strong>New Password</strong></label>
                            <input type="password" class="form-control" name="new_password" required placeholder="Enter new password" style="padding: 12px; border-radius: 6px;">
                            <small class="text-muted d-block mt-2">
                                <i class="fas fa-lightbulb"></i> Use at least 8 characters with a mix of letters, numbers, and symbols
                            </small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><strong>Confirm New Password</strong></label>
                            <input type="password" class="form-control" name="confirm_password" required placeholder="Confirm new password" style="padding: 12px; border-radius: 6px;">
                        </div>
                        <button type="submit" class="btn btn-warning w-100" style="padding: 12px; font-weight: 700; margin-top: 10px;">
                            <i class="fas fa-save"></i> Update Password
                        </button>
                        <div class="text-center mt-3">
                            <p class="text-muted">
                                <a href="{{ url_for('profile') }}" style="color: #FFD700; text-decoration: none; font-weight: 600;">
                                    Back to Profile
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
